description: 'FOCUS-aligned FinOps scaffold for Carter''s. No public API pricing or invoice surface is
  published; meters and FOCUS columns are the recommended starting points for partners that have negotiated
  private B2B agreements.'
notes: Billing is private (partner contracts). Reconcile once Carter's publishes API or partner pricing.
sources:
  - https://www.carters.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Carter's, Inc.
serviceCategory: Retail
billingModel:
  pricingCategory: Custom (Partner Contract)
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Carter's API
  ServiceCategory: Retail
  ProviderName: Carter's
  PublisherName: Carter's, Inc.
  InvoiceIssuerName: Carter's, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - partner
principles:
  - name: Visibility
    description: Track partner integration consumption through the negotiated reporting surface delivered
      with the partner agreement; no public usage API is published.
  - name: Allocation
    description: Tag partner integration costs to the consuming retail / supply-chain function before
      issuing chargeback.
  - name: Optimization
    description: Batch catalog and order updates; align polling cadence with Carter's published refresh
      windows to avoid wasted requests.
  - name: Accountability
    description: Assign a procurement and IT owner for the Carter's partner relationship; review invoiced
      partner fees against contractual SLAs.
